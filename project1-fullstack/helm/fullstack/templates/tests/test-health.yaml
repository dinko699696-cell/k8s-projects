apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-health"
  namespace: {{ .Values.namespace }}
  labels:
    app: helm-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-health
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          echo "Testing backend health endpoint..."
          RESULT=$(curl -s --max-time 5 http://backend-service:3000/health)
          echo "Response: $RESULT"
          echo "$RESULT" | grep -q '"status":"healthy"' && echo "PASS" && exit 0
          echo "FAIL" && exit 1
