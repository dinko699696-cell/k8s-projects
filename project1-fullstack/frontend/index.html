<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K8s Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; color: #7c84f0; font-weight: 700; letter-spacing: 0.5px; }
    #health-bar { display: flex; gap: 16px; font-size: 0.78rem; }
    .badge { padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .badge.healthy { background: #1a3a2a; color: #4ade80; }
    .badge.degraded { background: #3a1a1a; color: #f87171; }
    .badge.unknown { background: #2a2a2a; color: #94a3b8; }
    .badge.info { background: #1e2a3a; color: #60a5fa; }
    main { max-width: 860px; margin: 40px auto; padding: 0 24px; }
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select { background: #0f1117; border: 1px solid #2d3148; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; outline: none; }
    input:focus, select:focus { border-color: #7c84f0; }
    input[name="name"] { flex: 2; min-width: 160px; }
    input[name="description"] { flex: 3; min-width: 200px; }
    select { flex: 1; min-width: 110px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    #add-btn { background: #7c84f0; color: #fff; }
    .item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #2d3148; }
    .item:last-child { border-bottom: none; }
    .priority-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .priority-dot.high { background: #f87171; }
    .priority-dot.medium { background: #fbbf24; }
    .priority-dot.low { background: #4ade80; }
    .item-info { flex: 1; }
    .item-name { font-weight: 600; font-size: 0.95rem; }
    .item-desc { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    .item-meta { font-size: 0.75rem; color: #475569; }
    .del-btn { background: #2d1a1a; color: #f87171; border: 1px solid #3d2020; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; }
    #empty { color: #475569; text-align: center; padding: 32px 0; font-size: 0.9rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat { background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #7c84f0; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pod-tag { font-size: 0.72rem; background: #1e2a3a; color: #60a5fa; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>
<header>
  <h1>⎈ K8s Task Manager</h1>
  <div id="health-bar">
    <span id="hb-status" class="badge unknown">Checking...</span>
    <span id="hb-db" class="badge unknown">DB: —</span>
    <span id="hb-pod" class="badge info">Pod: —</span>
    <span id="hb-uptime" class="badge info">Uptime: —</span>
  </div>
</header>
<main>
  <div class="card">
    <h2>Stats</h2>
    <div class="stats-grid">
      <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total Items</div></div>
      <div class="stat"><div class="stat-value" id="stat-high">—</div><div class="stat-label">High Priority</div></div>
      <div class="stat"><div class="stat-value" id="stat-medium">—</div><div class="stat-label">Medium Priority</div></div>
      <div class="stat"><div class="stat-value" id="stat-low">—</div><div class="stat-label">Low Priority</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Add Item</h2>
    <div class="form-row">
      <input name="name" id="inp-name" placeholder="Task name *" />
      <input name="description" id="inp-desc" placeholder="Description (optional)" />
      <select id="inp-priority">
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="low">Low</option>
      </select>
      <button id="add-btn" onclick="addItem()">Add</button>
    </div>
  </div>

  <div class="card">
    <h2>Items <span id="serving-pod"></span></h2>
    <div id="items-list"><div id="empty">Loading...</div></div>
  </div>
</main>

<script>
  const API = '/api';

  async function fetchHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.getElementById('hb-status').className = `badge ${d.status === 'healthy' ? 'healthy' : 'degraded'}`;
      document.getElementById('hb-status').textContent = d.status === 'healthy' ? '● Healthy' : '● Degraded';
      document.getElementById('hb-db').className = `badge ${d.db === 'connected' ? 'healthy' : 'degraded'}`;
      document.getElementById('hb-db').textContent = `DB: ${d.db}`;
      document.getElementById('hb-pod').textContent = `Pod: ${d.pod}`;
      document.getElementById('hb-uptime').textContent = `Uptime: ${Math.floor(d.uptime)}s`;
    } catch {
      document.getElementById('hb-status').className = 'badge degraded';
      document.getElementById('hb-status').textContent = '● Unreachable';
    }
  }

  async function fetchItems() {
    try {
      const r = await fetch(`${API}/items`);
      const d = await r.json();
      const list = document.getElementById('items-list');
      document.getElementById('serving-pod').innerHTML = `<span class="pod-tag">${d.pod}</span>`;
      document.getElementById('stat-total').textContent = d.count;
      document.getElementById('stat-high').textContent = d.items.filter(i => i.priority === 'high').length;
      document.getElementById('stat-medium').textContent = d.items.filter(i => i.priority === 'medium').length;
      document.getElementById('stat-low').textContent = d.items.filter(i => i.priority === 'low').length;
      if (d.items.length === 0) {
        list.innerHTML = '<div id="empty">No items yet — add one above.</div>';
        return;
      }
      list.innerHTML = d.items.map(item => `
        <div class="item">
          <div class="priority-dot ${item.priority}"></div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
            <div class="item-meta">${item.priority} · ${new Date(item.createdAt).toLocaleString()}</div>
          </div>
          <button class="del-btn" onclick="deleteItem('${item._id}')">Delete</button>
        </div>`).join('');
    } catch(e) {
      document.getElementById('items-list').innerHTML = '<div id="empty">Failed to load items.</div>';
    }
  }

  async function addItem() {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) { alert('Task name is required'); return; }
    const body = { name, description: document.getElementById('inp-desc').value.trim(), priority: document.getElementById('inp-priority').value };
    await fetch(`${API}/items`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-desc').value = '';
    fetchItems();
  }

  async function deleteItem(id) {
    await fetch(`${API}/items/${id}`, { method: 'DELETE' });
    fetchItems();
  }

  fetchHealth();
  fetchItems();
  setInterval(fetchHealth, 10000);
  setInterval(fetchItems, 15000);
</script>
</body>
</html>
