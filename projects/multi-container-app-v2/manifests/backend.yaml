apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend-v2:local
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          value: "mongodb://mongo:27017/appdb"
        - name: REDIS_URL
          value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: app-v2
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000