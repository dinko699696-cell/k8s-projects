name: CI — Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'project1-fullstack/backend/**'
      - 'project1-fullstack/frontend/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: dancyber/fullstack-backend
  FRONTEND_IMAGE: dancyber/fullstack-frontend

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./project1-fullstack/backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./project1-fullstack/frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update manifest image tags
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short }}
          sed -i "s|${{ env.BACKEND_IMAGE }}:.*|${{ env.BACKEND_IMAGE }}:${SHORT_SHA}|g" project1-fullstack/manifests/backend-deployment.yaml
          sed -i "s|${{ env.FRONTEND_IMAGE }}:.*|${{ env.FRONTEND_IMAGE }}:${SHORT_SHA}|g" project1-fullstack/manifests/frontend-deployment.yaml

      - name: Commit updated manifests
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project1-fullstack/manifests/backend-deployment.yaml
          git add project1-fullstack/manifests/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.sha.outputs.short }}"
          git push
